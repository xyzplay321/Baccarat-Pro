<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat Terminal</title>
    <style>
        /* 經典終端機風格：黑底、亮綠/亮白字、等寬字體 */
        body { 
            background-color: #0c0c0c; 
            color: #d4d4d4; 
            font-family: "Courier New", Courier, monospace; 
            margin: 0; 
            padding: 15px; 
            font-size: 15px; 
            line-height: 1.4;
        }
        /* 文字輸出區塊：保留所有的空格與換行 */
        #output {
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        /* 指令輸入區塊 */
        .input-area {
            margin-top: 10px;
            color: #f39c12; /* 提示字體使用黃色 */
            font-weight: bold;
        }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
        /* 隱藏原生輸入框的邊界，讓它看起來像終端機游標 */
        input {
            background: transparent;
            border: none;
            color: #00ff88;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="output">連線中... 啟動量化大腦...</div>

    <div class="input-area">
        <div>👉 指令: [數字]點數 | [B]莊 [P]閒 [T]和 | [U]悔棋 | [R]重置</div>
        <div class="input-line">
            請輸入: <input type="text" id="cmdbox" autocomplete="off" autofocus>
        </div>
    </div>

    <script>
        const out = document.getElementById('output');
        const cmdbox = document.getElementById('cmdbox');

        // 發送指令到後端並更新畫面
        function sendCmd(command) {
            fetch('/api/cmd', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cmd: command})
            })
            .then(res => res.json())
            .then(data => {
                out.innerText = data.terminal_text; // 將 Python 排版好的文字直接貼上
                window.scrollTo(0, document.body.scrollHeight); // 畫面自動滾到最底
            });
        }

        // 監聽輸入框的 Enter 鍵
        cmdbox.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = cmdbox.value.trim();
                sendCmd(val); // 送出字串 (不管是有數字還是快捷英文字母)
                cmdbox.value = ''; // 清空輸入框
            }
        });

        // 確保網頁點擊任何地方，游標都會一直鎖定在輸入框，方便隨時盲打
        document.addEventListener('click', () => {
            cmdbox.focus();
        });

        // 網頁載入時，自動發送一個空指令來獲取第 1 局的畫面
        sendCmd('');
    </script>
</body>
</html>
